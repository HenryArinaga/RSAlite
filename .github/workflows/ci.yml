name: RSAlite CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install GCC & build tools
        run: sudo apt update && sudo apt install -y build-essential pkg-config libgtk-3-dev

      - name: Build and run tests
        run: |
          make clean
          make test
